AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 08 Demo Setup - Automate Scaling (EC2 Auto Scaling, Launch Templates)'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the demo resources
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet in AZ1 (for ASG instances)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet in AZ2 (for ASG instances)

Resources:

  ASGInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mod08-ASGInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ASGInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: Mod08-ASGInstanceProfile
      Roles: [!Ref ASGInstanceRole]

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Mod08 ASG instances - outbound only for SSM
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags: [{Key: Name, Value: Mod08-ASG-SG}]

Outputs:
  VPCId: {Value: !Ref VpcId}
  PrivateSubnet1Id: {Value: !Ref PrivateSubnet1}
  PrivateSubnet2Id: {Value: !Ref PrivateSubnet2}
  SGId: {Value: !Ref InstanceSecurityGroup}
  InstanceProfileArn: {Value: !GetAtt ASGInstanceProfile.Arn}
