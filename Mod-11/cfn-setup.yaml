AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 11 Demo Setup - Operate Secure and Resilient Networks (VPC, NACLs, Flow Logs)'

Resources:

  # IAM Role for VPC Flow Logs to publish to CloudWatch
  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mod11-VPCFlowLogsRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: vpc-flow-logs.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

Outputs:
  FlowLogsRoleArn:
    Value: !GetAtt FlowLogsRole.Arn
    Description: IAM role for VPC Flow Logs

