AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 09 Demo Setup - Monitor and Maintain System Health (CloudWatch)'

Resources:

  DemoInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mod09-DemoInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  DemoInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: Mod09-DemoInstanceProfile
      Roles: [!Ref DemoInstanceRole]

  DemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref DemoInstanceProfile
      Tags:
        - Key: Name
          Value: Mod09-DemoInstance

Outputs:
  InstanceId: {Value: !Ref DemoInstance}

