AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 06 Demo Setup - Manage Resources (Run Command, Parameter Store, Maintenance Windows)'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet with NAT Gateway access for SSM connectivity
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to create the security group in

Resources:

  DemoInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mod06-DemoInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  DemoInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: Mod06-DemoInstanceProfile
      Roles: [!Ref DemoInstanceRole]

  DemoSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Mod06 Demo - Outbound only (SSM access via NAT)
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Mod06-DemoSG

  DemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref DemoInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref DemoSecurityGroup
      Tags:
        - Key: Name
          Value: Mod06-DemoInstance
        - Key: Environment
          Value: Production
        - Key: PatchGroup
          Value: Production-Linux

Outputs:
  InstanceId:
    Value: !Ref DemoInstance
