AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 07 Demo Setup - Configure Highly Available Systems (ELB, Route 53)'

Resources:

  DemoVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: Mod07-DemoVPC}]

  SubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DemoVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: Mod07-Subnet-AZ1}]

  SubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DemoVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: Mod07-Subnet-AZ2}]

  IGW:
    Type: AWS::EC2::InternetGateway
  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DemoVPC
      InternetGatewayId: !Ref IGW

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DemoVPC
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW
  RTAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref SubnetAZ1, RouteTableId: !Ref RouteTable}
  RTAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref SubnetAZ2, RouteTableId: !Ref RouteTable}

  DemoSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTP access
      VpcId: !Ref DemoVPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0}

  WebInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      SubnetId: !Ref SubnetAZ1
      SecurityGroupIds: [!Ref DemoSG]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y httpd
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          AZ=$(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)
          echo "<h1>Instance: ${INSTANCE_ID}</h1><p>AZ: ${AZ}</p>" > /var/www/html/index.html
          systemctl start httpd && systemctl enable httpd
      Tags: [{Key: Name, Value: Web-AZ1}]

  WebInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      SubnetId: !Ref SubnetAZ2
      SecurityGroupIds: [!Ref DemoSG]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y httpd
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          AZ=$(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)
          echo "<h1>Instance: ${INSTANCE_ID}</h1><p>AZ: ${AZ}</p>" > /var/www/html/index.html
          systemctl start httpd && systemctl enable httpd
      Tags: [{Key: Name, Value: Web-AZ2}]

Outputs:
  VPCId: {Value: !Ref DemoVPC}
  SubnetAZ1Id: {Value: !Ref SubnetAZ1}
  SubnetAZ2Id: {Value: !Ref SubnetAZ2}
  SGId: {Value: !Ref DemoSG}
  Instance1Id: {Value: !Ref WebInstance1}
  Instance2Id: {Value: !Ref WebInstance2}

