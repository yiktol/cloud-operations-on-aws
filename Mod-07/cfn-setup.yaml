AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 07 Demo Setup - Configure Highly Available Systems (ELB, Route 53)'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the demo resources
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet in AZ1 (for ALB)
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet in AZ2 (for ALB)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet in AZ1 (for EC2 instances)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet in AZ2 (for EC2 instances)

Resources:

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - Allow HTTP from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0}
      Tags: [{Key: Name, Value: Mod07-ALB-SG}]

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instances - Allow HTTP from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags: [{Key: Name, Value: Mod07-Instance-SG}]

  WebInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds: [!Ref InstanceSecurityGroup]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y httpd
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
          echo "<h1>Instance: ${INSTANCE_ID}</h1><p>AZ: ${AZ}</p>" > /var/www/html/index.html
          systemctl start httpd && systemctl enable httpd
      Tags: [{Key: Name, Value: Web-AZ1}]

  WebInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      SubnetId: !Ref PrivateSubnet2
      SecurityGroupIds: [!Ref InstanceSecurityGroup]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y httpd
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
          echo "<h1>Instance: ${INSTANCE_ID}</h1><p>AZ: ${AZ}</p>" > /var/www/html/index.html
          systemctl start httpd && systemctl enable httpd
      Tags: [{Key: Name, Value: Web-AZ2}]

Outputs:
  VPCId: {Value: !Ref VpcId}
  PublicSubnet1Id: {Value: !Ref PublicSubnet1}
  PublicSubnet2Id: {Value: !Ref PublicSubnet2}
  PrivateSubnet1Id: {Value: !Ref PrivateSubnet1}
  PrivateSubnet2Id: {Value: !Ref PrivateSubnet2}
  ALBSecurityGroupId: {Value: !Ref ALBSecurityGroup}
  InstanceSecurityGroupId: {Value: !Ref InstanceSecurityGroup}
  Instance1Id: {Value: !Ref WebInstance1}
  Instance2Id: {Value: !Ref WebInstance2}
