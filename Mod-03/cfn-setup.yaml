AWSTemplateFormatVersion: '2010-09-09'
Description: 'Module 03 Demo Setup - System Discovery (Session Manager, SSM Inventory, AWS Config Rules)'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the instance in (must have internet access for SSM)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to create the security group in

Resources:

  DemoInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mod03-DemoInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  DemoInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: Mod03-DemoInstanceProfile
      Roles: [!Ref DemoInstanceRole]

  DemoSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Mod03 Demo - No inbound access (SSM only)
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Mod03-DemoSG

  DemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref DemoInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref DemoSecurityGroup
      Tags:
        - Key: Name
          Value: Mod03-DemoInstance
        - Key: Environment
          Value: Demo

  # SSM Inventory Association — collects software, network, OS info every 30 minutes
  InventoryAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-GatherSoftwareInventory
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref DemoInstance
      ScheduleExpression: "rate(30 minutes)"
      Parameters:
        applications: ["Enabled"]
        awsComponents: ["Enabled"]
        networkConfig: ["Enabled"]
        services: ["Enabled"]

  # Config Rules — assumes AWS Config recorder is already enabled
  ConfigRuleSSMManaged:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: ec2-instance-managed-by-systems-manager
      Description: EC2 instances must be managed by Systems Manager
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::Instance
      Source:
        Owner: AWS
        SourceIdentifier: EC2_INSTANCE_MANAGED_BY_SSM

  ConfigRuleNoPublicIP:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: ec2-instance-no-public-ip
      Description: EC2 instances should not have public IPs
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::Instance
      Source:
        Owner: AWS
        SourceIdentifier: EC2_INSTANCE_NO_PUBLIC_IP

Outputs:
  InstanceId:
    Value: !Ref DemoInstance
